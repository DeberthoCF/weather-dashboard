<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>

    <link rel="stylesheet" href="css/style.css" />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    />
  </head>

  <body>
    <header>
      <h1>
        <i class="fa-solid fa-cloud-sun"></i>
        Weather Dashboard
      </h1>

      <p>Search any city and get the current weather.</p>
    </header>

    <main>
      <section class="search-section">
        <h2 class="visually-hidden">Weather Search</h2>

        <form id="weatherForm">
          <label for="city">City</label>

          <input
            type="text"
            id="city"
            placeholder="Enter a city..."
            aria-describedby="errorMessage"
          />

          <p id="errorMessage" class="error-message"></p>

          <button type="submit">
            <i class="fa-solid fa-magnifying-glass"></i>

            Search
          </button>
        </form>
      </section>

      <section class="loading hidden">
        <h2 class="visually-hidden">Loading</h2>

        <div class="spinner"></div>
        <p>Loading weather...</p>
      </section>

      <section class="weather-card hidden">
        <h2 class="visually-hidden">Weather Information</h2>

        <img
          id="weatherIcon"
          src="https://openweathermap.org/img/wn/01d@2x.png"
          alt="Weather icon"
        />

        <h2 id="cityName">Search a city</h2>

        <p id="country">country</p>

        <h3 id="temperature">-- °C</h3>

        <p id="weatherDescription">weather</p>

        <p id="windSpeed">wind speed</p>
      </section>
    </main>

    <footer>
      <p>LOG3500 • Weather Dashboard • ISTEAH 2026</p>

      <a href="https://jigsaw.w3.org/css-validator/check/referer">
        <img
          src="https://jigsaw.w3.org/css-validator/images/vcss-blue"
          alt="Valid CSS!"
          class="css-validator"
        />
      </a>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
